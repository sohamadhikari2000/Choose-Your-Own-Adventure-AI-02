schemaVersion: "1.2"

build:
  env:
    - name: GOOGLE_PYTHON_VERSION
      value: "3.10.15"

endpoints:
  - name: rest-api-be2
    displayName: REST API
    service:
      basePath: /
      port: 8000
    type: REST
    networkVisibilities:
      - Project
      - Public

dependencies:
    connectionReferences:
    - name: openai_connection
      resourceRef: thirdparty:openai/v2